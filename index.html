<!DOCTYPE html>
<html lang="hr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miris Grada</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
    <!-- FontAwesome za ikone -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased selection:bg-cyan-500 selection:text-slate-950">

    <!-- Navigacija -->
    <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid font-bold text-cyan-400 text-2xl">⚡</i>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r flex from-cyan-400 to-indigo-400 bg-clip-text text-transparent">mg   </span>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-300">
                <a href="#pocetna" class="hover:text-cyan-400 transition-colors">Početna</a>
                <a href="#znacajke" class="hover:text-cyan-400 transition-colors">Značajke</a>
                <a href="#usluge" class="hover:text-cyan-400 transition-colors">Usluge</a>
                <a href="#kontakt" class="px-4 py-2 bg-cyan-500 text-slate-950 rounded-lg font-semibold hover:bg-cyan-400 transition-all shadow-lg shadow-cyan-500/20">Kontakt</a>
            </div>
        </div>
    </nav>

    <!-- Hero Sekcija -->
    <section id="pocetna" class="relative min-h-[calc(100vh-4rem)] flex items-center justify-center overflow-hidden px-6">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_30%_30%,rgba(6,182,212,0.1),transparent_50%)]"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_70%_80%,rgba(79,70,229,0.15),transparent_50%)]"></div>
        
        <div class="max-w-4xl text-center z-10 space-y-6">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-slate-700 bg-slate-800/50 text-xs text-cyan-400">
                <span class="flex h-2 w-2 rounded-full bg-cyan-400 animate-pulse"></span> Sustav je aktivan v0.0.1
            </div>
            <h1 class="text-4xl sm:text-6xl font-black tracking-tight leading-none text-white">
                MIRIS GRADA <br>
                <span class="bg-gradient-to-r from-cyan-400 via-sky-400 to-indigo-500 bg-clip-text text-transparent">////////////////////</span>
            </h1>
            <p class="text-base sm:text-xl text-slate-400 max-w-2xl mx-auto font-light">
                Stranica je u izradi!
            </p>
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
                <a href="#znacajke" class="w-full sm:w-auto px-8 py-3 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-600/30 text-center">Pokreni modul</a>
                <a href="#kontakt" class="w-full sm:w-auto px-8 py-3 bg-slate-850 border border-slate-700 text-slate-300 rounded-xl font-medium hover:bg-slate-800 transition-all text-center">Saznaj više</a>
            </div>
        </div>
    </section>
